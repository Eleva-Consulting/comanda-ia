<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <rect width="32" height="32" rx="8" fill="#f97316"/>
  <!-- Fork (left) -->
  <g fill="#ffffff">
    <!-- Fork tines -->
    <rect x="9" y="5" width="1.4" height="6" rx="0.7"/>
    <rect x="11.3" y="5" width="1.4" height="6" rx="0.7"/>
    <rect x="13.6" y="5" width="1.4" height="6" rx="0.7"/>
    <!-- Fork neck (connecting tines to handle) -->
    <rect x="9.8" y="10.5" width="4.4" height="2" rx="1"/>
    <!-- Fork handle -->
    <rect x="10.8" y="12" width="2.4" height="12" rx="1.2"/>
  </g>
  <!-- Knife (right) -->
  <g fill="#ffffff">
    <!-- Knife blade -->
    <path d="M18.5 5 C18.5 5 22 7 22 11 L18.5 11 Z" fill="#ffffff" opacity="0.85"/>
    <rect x="18.5" y="5" width="1.5" height="6" rx="0.7"/>
    <!-- Knife handle -->
    <rect x="18.5" y="11" width="1.5" height="13" rx="0.75"/>
  </g>
</svg>
